module: w2-numpy
competencies:
- SH3
questions:
- id: q1
  type: mcq
  prompt: NumPy 广播中，形状 (3,1) 与 (1,4) 相加得到的形状是？
  choices:
  - (3,1)
  - (1,4)
  - (3,4)
  - 报错
- id: q2
  type: short
  prompt: 为什么优先用向量化而不是 Python for 循环？（请提到关键词）
- id: q3
  type: mcq
  prompt: 对 NumPy 数组 X，执行 Y = X[::2] 后修改 Y，会改变原数组 X 吗？
  choices:
  - 会
  - 不会
  - 随机
  - 报错
- id: q4
  type: mcq
  prompt: X 是 (100,3) 数组，X.sum(axis=0) 返回的形状是？
  choices:
  - (100,)
  - (3,)
  - (100, 3)
  - 标量
- id: q5
  type: short
  prompt: einsum 相比嵌套 for 循环的主要优势是什么？（请提到关键词）
