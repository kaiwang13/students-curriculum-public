module: w5-ml
competencies:
- SH7
questions:
- id: q1
  type: mcq
  prompt: K折交叉验证的主要目的是什么？
  choices:
  - 充分利用所有样本进行训练和验证
  - 减少模型训练时间
  - 消除数据中的噪声
  - 直接改善模型性能
- id: q2
  type: mcq
  prompt: 过拟合（overfitting）的典型表现是什么？
  choices:
  - 训练集和测试集上的精度都很低
  - 训练集精度低，但测试集精度高
  - 模型的参数数量太多
  - 训练集精度高，但测试集精度低
- id: q3
  type: mcq
  prompt: ROC-AUC 指标的核心含义是什么？
  choices:
  - 分类准确率的百分比
  - 真正例率和假正例率的简单平均
  - 模型排序能力强弱，与分类阈值无关
  - 精确率和召回率的乘积
- id: q4
  type: mcq
  prompt: 在训练集上选择模型超参数应该使用什么方法？
  choices:
  - 直接在测试集上调整超参数
  - 使用交叉验证在训练集上调整超参数
  - 使用全部数据进行网格搜索
  - 使用验证集随机搜索
- id: q5
  type: mcq
  prompt: 逻辑回归的输出概率值应该满足什么性质？
  choices:
  - 介于0和1之间，表示属于正类的概率
  - 介于-1和1之间
  - 是标准正态分布
  - 无特殊要求，可以是任意实数
- id: q6
  type: mcq
  prompt: 为什么要将数据集划分为训练集和测试集，而不是用全部数据训练模型？
  choices:
  - 测试集用于加速模型训练过程
  - 测试集用于选择最优超参数
  - 在未见过的数据上估计模型的泛化误差
  - 划分数据集可以消除数据中的异常值
- id: q7
  type: short
  prompt: 为什么在实际应用中需要做概率校准（probability calibration）？请用50字以内解释。
