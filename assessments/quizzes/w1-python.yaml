module: w1-python
competencies:
- SH1
- SH2
questions:
- id: q1
  type: mcq
  prompt: 'def f(a=[]): a.append(1); return a —— 连续调用 f() 两次，第二次返回？'
  choices:
  - '[1, 1]'
  - '[1]'
  - 报错
  - '[]'
- id: q2
  type: mcq
  prompt: 以下哪个最适合表示"不可变的带字段的小对象"？
  choices:
  - 普通 class
  - dict
  - '@dataclass(frozen=True)'
  - list
- id: q3
  type: mcq
  prompt: 生成器相比返回列表，主要优点是？
  choices:
  - 更快的随机访问
  - 惰性求值、省内存
  - 自动排序
  - 线程安全
- id: q4
  type: mcq
  prompt: Python 中 `with` 语句（上下文管理器）的主要作用是什么？
  choices:
  - 对代码块进行性能分析
  - 声明全局变量
  - 实现并发执行
  - 确保资源（文件/锁/连接等）被自动释放，即使发生异常
- id: q5
  type: short
  prompt: 装饰器本质上是什么？（请提到关键词）
