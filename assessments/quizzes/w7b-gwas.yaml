module: w7b-gwas
competencies:
- GB2
questions:
- id: q1
  type: mcq
  prompt: 全基因组关联分析 (GWAS) 的主要目的是什么？
  choices:
  - 检验基因变异与表型之间的关联
  - 预测个体的基因序列
  - 计算群体的遗传多样性
  - 进行蛋白质结构预测
- id: q2
  type: mcq
  prompt: 次要等位基因频率 (MAF) 的定义是什么？
  choices:
  - 所有等位基因频率之和
  - 主要等位基因频率
  - 两个等位基因中较少的那个频率
  - 特定个体的杂合率
- id: q3
  type: mcq
  prompt: 为什么在关联测试中需要加入协变量（如主成分PC）?
  choices:
  - 增加样本量
  - 校正群体结构导致的混杂偏差
  - 提高计算速度
  - 简化回归模型
- id: q4
  type: mcq
  prompt: 基因组膨胀因子 (λ_GC) 主要衡量的是什么？
  choices:
  - 单核苷酸多态性的总数
  - 等位基因频率的变异
  - 不同群体间的遗传距离
  - 统计检验中的系统性偏差和膨胀
- id: q5
  type: mcq
  prompt: 逆正态变换 (INT) 在 GWAS 中的主要优势是什么？
  choices:
  - 提高计算精度，减少舍入误差
  - 当表型分布偏斜时增强检验稳健性并使结果更正态
  - 完全消除样本中的异常值
  - 加速全基因组扫描
- id: q6
  type: short
  prompt: 为什么要对表型做逆正态变换 (INT)？
